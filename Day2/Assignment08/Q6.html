<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Registration</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.3/dist/jquery.validate.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.3/additional-methods.min.js"></script>
    <script>
        $(document).ready(()=>{
            $.validator.addMethod("emailonly",function(value,element){
               return this.optional(element) || /^([a-zA-Z_\#\$]+)@([a-zA-Z]+).([a-zA-Z]{2,3})$/.test(value)
            },"Invalid EmailId")
            $("#frm").validate({
                rules:{
                    username:{required:true,lettersonly:true},
                    fname:{required:true,lettersonly:true},
                    lname:{required:true,lettersonly:true},
                    password:{required:true,minlength:7,maxlength:12},
                    rpassword:{required:true,equalTo:'#password'},
                    email:{required:true,emailonly:true},
                    gen:{required:true},
                },
                messeges:{

                },
                errorPlacement:(error,element)=>{
                    if(element.attr("name")=="gen"){
                        error.appendTo("#errorToShow")
                    }
                    else if(element.attr("name")=="ch"){
                        error.appendTo("#cherror")
                    }
                    else{
                        error.insertAfter(element)
                    }
                }
            })

            $("#check").click(()=>{
                if($("#check").is(":checked")){
                    $("#btn").removeAttr("disabled")
                }
                else{
                    $("#btn").attr("disabled","true")
                }
            })
        })
    </script>
    <style>
        .error{color:red}
    </style>
</head>
<body>
    <div style="background-color: lightblue; width: 50%; padding-top: 20px; padding-bottom: 20px; margin: 250px;" class="main">
        <div class="register" style="text-align: center;">
            <h2 style="text-align: center;">Registration Page</h2>
            <form id="frm">
                <table cellpadding="7px" align="center">
                    <tr>
                        <td>Username</td>
                        <td><input type="text" name="username" id="username" class="form-control" placeholder="Enter Username"></td>
                    </tr>
                    <tr>
                        <td>First name</td>
                        <td>  <input type="text" name="fname" id="fname" class="form-control" placeholder="Enter First Name"></td>
                    </tr>
                    <tr>
                        <td>Last name</td>
                        <td> <input type="text" name="lname" id="lname" class="form-control" placeholder="Enter Last Name"></td>
                    </tr>
                    <tr>
                        <td>Password</td>
                        <td> <input type="password" name="password" id="password" class="form-control" placeholder="Enter Password"> </td>
                    </tr>
                    <tr>
                        <td>Confirm Password</td>
                        <td> <input type="password" name="rpassword" id="rpassword" class="form-control" placeholder="Re-enter Password"> </td>
                    </tr>
                    <tr>
                        <td>Email</td>
                        <td><input type="email" name="email" id="email" class="form-control" placeholder="Enter Email"></td>
                    </tr>
                    <tr>
                        <td>Gender</td>
                        <td> <input type="radio" name="gen"> Male
                            <input type="radio" name="gen"> Female
                            <span id="errorToShow"></span>
                        </td>   
                    </tr>
                    <tr>
                        <td><input type="checkbox" id="check"> I accept terms and condition
                            <span id="cherror"></span></td>
                        <td>&nbsp;&nbsp;<button type="submit" id="btn" class="btn btn-primary" disabled="true">Register</button>
                             <button type="submit" id="print" class="btn btn-primary" disabled="true">Print</button></td>
                    </tr>
                </table>
            </form>
        </div>
    </div>
</body>
</html>
