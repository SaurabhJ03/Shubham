<!DOCTYPE html>
<html>
<head>
    
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='css/bootstrap.css'>
    <script src='js/jquery-3.6.0.js'></script>
    <script src="js/jquery.validate.js"></script>
    <script src="js/additional-methods.js"></script>
    <style>
        .error{color:red}
    </style>
</head>
<body>
  
    <h1 style="color: blue;font-family: 'Courier New', Courier, monospace; "><center>Parent Registration Page</center></h1><br>
    <div style="margin-left: 27%;">
        <form id="frm">
    <label>Name</label><br>
    <input name="uname" type="text" placeholder="Enter Your Full Name"><br><br>
    
    <label for="">E-mail</label><label style="margin-left: 25%;">Mobile</label><br>
    <input name="email" style="width:24%;" type="text" placeholder="Enter your email">
    <input style="margin-left: 45px;" type="text" placeholder="enter your mob" name="mobile"><br><br>
    <label for="">Occupation</label><br>
    <input type="text" placeholder="Enter OCc"><br><br>
    <label for="">Child std</label><label for="" style="margin-left: 23.5%;">Division</label><br>
    <select name="" id="">
<option value="" selected disabled >Please select</option> 
<option value="">1st</option>
<option value="">2nd</option>
<option value="">BE</option>
</select>
<select name="" id="" style="margin-left: 18.5%;">
    <option value="" selected disabled >Please select</option> 
    <option value="">A</option>
    <option value="">B</option>
    <option value="">C</option>
</select><br><br>
<label for="">Captcha</label><br>
<input type="text" placeholder="Enter Captcha">&emsp;&emsp;&emsp;&emsp;<label style="background-color: 
red;color: cornsilk;">1142</label><br><br><br>
<div>
    <input type="submit" name="submit" class="btn btn-success" id="submit" value="submit">
    &emsp;&emsp;&emsp;&emsp;
    <button>Reset</button>
</div>
    

</div>

</form>

<script>
 $(document).ready(()=>{
            $.validator.addMethod("emailonly",function(value,element){
               return this.optional(element) || /^([a-zA-Z_\#\$]+)@([a-zA-Z]+).([a-zA-Z]{2,3})$/.test(value)
            },"Invalid EmailId")

            ("#frm").validate({
                    rules:{
                            uname:{required:true,lettersonly:true},
                            // pwd:{required:true,minlength:5,maxlength:10},
                            // cpwd:{required:true,equalTo:'#pwd'},
                            email:{emailonly:true},
                             mobile:{digits:true,minlength:10,maxlength:10}
                            // gen:{required:true},
                            // ch:{required:true}

                    },
                    messages:{
                         uname:{required:"Username is required"},
                        // pwd:{required:"password is required",minlength:"min 5 char",maxlength:"max 10 char only"},
                         mobile:{minlength:"only 10 digits",maxlength:"only 10 digits"}
                    },
                    errorPlacement:(error,element)=>{
                        if(element.attr("name")=="gen"){
                            error.appendTo("#errorToShow")
                        }
                        else if(element.attr("name")=="ch"){
                            error.appendTo("#cherror")
                        }
                        else
                        {
                            error.insertAfter(element)
                        }
                    }
            })
 })






</script>
</body>
</html>
